<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#FFB5BA"/>

  <!-- Head -->
  <circle cx="60" cy="44" r="22" fill="#E8B5A0"/>

  <!-- Hair -->
  <path d="M 38 38 Q 38 18 60 16 Q 82 18 82 38 L 82 48 Q 82 56 60 59 Q 38 56 38 48 Z" fill="#1A1A1A"/>

  <!-- Hair sides -->
  <ellipse cx="36" cy="44" rx="6" ry="12" fill="#1A1A1A"/>
  <ellipse cx="84" cy="44" rx="6" ry="12" fill="#1A1A1A"/>

  <!-- Eyes -->
  <circle cx="53" cy="41" r="2.5" fill="#333333"/>
  <circle cx="67" cy="41" r="2.5" fill="#333333"/>

  <!-- Bushy beard -->
  <path d="M 50 50 Q 60 56 70 50" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 48 52 Q 55 54 62 52" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 58 54 Q 65 55 72 52" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Beard shading -->
  <ellipse cx="52" cy="52" rx="3" ry="4" fill="#1A1A1A" opacity="0.3"/>
  <ellipse cx="60" cy="54" rx="2" ry="3" fill="#1A1A1A" opacity="0.3"/>
  <ellipse cx="68" cy="52" rx="3" ry="4" fill="#1A1A1A" opacity="0.3"/>

  <!-- Nose -->
  <line x1="60" y1="43" x2="60" y2="48" stroke="#D89080" stroke-width="1.2"/>

  <!-- Mouth (hidden by beard mostly) -->
  <path d="M 56 50 Q 60 52 64 50" stroke="#D67C6C" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Eyebrows -->
  <path d="M 50 38 Q 53 37 56 38" stroke="#1A1A1A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M 64 38 Q 67 37 70 38" stroke="#1A1A1A" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="54" y="65" width="12" height="8" fill="#E8B5A0"/>

  <!-- Shirt -->
  <path d="M 38 73 L 82 73 L 78 95 L 42 95 Z" fill="#2C3E50"/>

  <!-- Shirt collar -->
  <path d="M 54 73 L 60 77 L 66 73" fill="#1A252F"/>
</svg>