  <!-- Mouth -->
  <path d="M 56 52 Q 60 55 64 52" stroke="#D67C6C" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Rosy cheeks -->
  <circle cx="41" cy="48" r="4" fill="#FFB5BA" opacity="0.6"/>
  <circle cx="79" cy="48" r="4" fill="#FFB5BA" opacity="0.6"/>

  <!-- Neck -->
  <rect x="54" y="66" width="12" height="8" fill="#F4A89D"/>

  <!-- Dress/top -->
  <path d="M 38 74 L 82 74 L 78 95 L 42 95 Z" fill="#E74C3C"/>

  <!-- Top detail -->
  <path d="M 54 74 L 60 78 L 66 74" fill="#C0392B"/>
