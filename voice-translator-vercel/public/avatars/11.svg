<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#FFB5BA"/>

  <!-- Head -->
  <circle cx="60" cy="45" r="22" fill="#F4A89D"/>

  <!-- Hair - auburn/red -->
  <path d="M 38 40 Q 38 20 60 18 Q 82 20 82 40 L 82 48 Q 82 56 60 59 Q 38 56 38 48 Z" fill="#C85A3A"/>

  <!-- Hair waves -->
  <path d="M 42 35 Q 48 32 54 34" stroke="#A0451B" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M 66 34 Q 72 32 78 35" stroke="#A0451B" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- Left side hair -->
  <ellipse cx="37" cy="45" rx="6" ry="10" fill="#C85A3A"/>

  <!-- Right side hair -->
  <ellipse cx="83" cy="45" rx="6" ry="10" fill="#C85A3A"/>

  <!-- Eyes -->
  <circle cx="53" cy="43" r="2.5" fill="#333333"/>
  <circle cx="67" cy="43" r="2.5" fill="#333333"/>
  <circle cx="54" cy="41" r="1.2" fill="white"/>
  <circle cx="68" cy="41" r="1.2" fill="white"/>

  <!-- Eyebrows -->
  <path d="M 50 40 Q 53 39 56 40" stroke="#A0451B" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 64 40 Q 67 39 70 40" stroke="#A0451B" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
