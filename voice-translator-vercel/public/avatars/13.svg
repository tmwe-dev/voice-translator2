<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#FFB5BA"/>

  <!-- Head -->
  <circle cx="60" cy="45" r="21" fill="#FDBF8F"/>

  <!-- Hair - pink/purple -->
  <path d="M 39 40 Q 39 20 60 18 Q 81 20 81 40 L 81 48 Q 81 54 60 57 Q 39 54 39 48 Z" fill="#D946A6"/>

  <!-- Hair streaks - lighter purple -->
  <path d="M 48 30 Q 52 25 56 30" stroke="#E879B9" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 64 30 Q 68 25 72 30" stroke="#E879B9" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Side bangs -->
  <path d="M 38 42 Q 35 38 36 45" stroke="#D946A6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 82 42 Q 85 38 84 45" stroke="#D946A6" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="53" cy="44" r="3" fill="#333333"/>
  <circle cx="67" cy="44" r="3" fill="#333333"/>
  <circle cx="54" cy="42" r="1.5" fill="white"/>
  <circle cx="68" cy="42" r="1.5" fill="white"/>

  <!-- Eye shine -->
  <circle cx="54.5" cy="42.5" r="0.5" fill="#FFD700"/>
  <circle cx="68.5" cy="42.5" r="0.5" fill="#FFD700"/>

  <!-- Rosy cheeks - very pronounced -->
  <circle cx="40" cy="49" r="5" fill="#FFB5BA" opacity="0.7"/>
  <circle cx="80" cy="49" r="5" fill="#FFB5BA" opacity="0.7"/>

  <!-- Nose -->
  <ellipse cx="60" cy="47" rx="1.5" ry="2" fill="#E8956D"/>

  <!-- Mouth - big smile -->
  <path d="M 56 52 Q 60 55 64 52" stroke="#FF69B4" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="54" y="65" width="12" height="8" fill="#FDBF8F"/>

  <!-- Clothing - cute top -->
  <path d="M 38 73 L 82 73 L 78 95 L 42 95 Z" fill="#E879B9"/>

  <!-- Top pattern -->
  <circle cx="50" cy="80" r="1.5" fill="#D946A6"/>
  <circle cx="60" cy="80" r="1.5" fill="#D946A6"/>
  <circle cx="70" cy="80" r="1.5" fill="#D946A6"/>

  <!-- Heart on chest -->
  <path d="M 60 85 Q 57 83 55 85 Q 55 88 60 91 Q 65 88 65 85 Q 63 83 60 85" fill="#FF1493" opacity="0.7"/>
</svg>