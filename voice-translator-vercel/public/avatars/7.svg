<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="60" cy="60" r="58" fill="#B2DFDB"/>
  <!-- Face -->
  <circle cx="60" cy="58" r="38" fill="#FFE0B2"/>
  <!-- Hair - straight black long -->
  <path d="M 22 52 Q 22 16 60 12 Q 98 16 98 52 Q 95 30 60 24 Q 25 30 22 52" fill="#1A1A1A"/>
  <!-- Long hair sides -->
  <path d="M 22 52 Q 18 70 22 90 L 28 90 Q 26 70 26 52" fill="#1A1A1A"/>
  <path d="M 98 52 Q 102 70 98 90 L 92 90 Q 94 70 94 52" fill="#1A1A1A"/>
  <!-- Bangs -->
  <path d="M 30 44 Q 38 32 60 30 Q 50 38 30 44" fill="#1A1A1A"/>
  <!-- Hair shine -->
  <path d="M 40 18 Q 50 14 60 15" stroke="#424242" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Eyebrows -->
  <path d="M 42 47 Q 48 44 54 47" stroke="#1A1A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 66 47 Q 72 44 78 47" stroke="#1A1A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes - dark almond -->
  <ellipse cx="48" cy="55" rx="6" ry="5" fill="white"/>
  <circle cx="49" cy="55" r="3.5" fill="#1A1A1A"/>
  <circle cx="50" cy="54" r="1.2" fill="white"/>
  <ellipse cx="72" cy="55" rx="6" ry="5" fill="white"/>
  <circle cx="73" cy="55" r="3.5" fill="#1A1A1A"/>
  <circle cx="74" cy="54" r="1.2" fill="white"/>
  <!-- Eyelids -->
  <path d="M 42 53 Q 48 50 54 53" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
  <path d="M 66 53 Q 72 50 78 53" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
  <!-- Nose -->
  <path d="M 60 58 Q 58 63 60 64 Q 62 63 60 58" fill="#F0C0A0"/>
  <!-- Mouth - gentle smile -->
  <path d="M 53 69 Q 60 74 67 69" stroke="#E57373" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Lips -->
  <path d="M 55 69 Q 60 72 65 69" fill="#EF9A9A"/>
  <!-- Blush -->
  <circle cx="38" cy="63" r="5" fill="#FFCDD2" opacity="0.4"/>
  <circle cx="82" cy="63" r="5" fill="#FFCDD2" opacity="0.4"/>
  <!-- Neck -->
  <rect x="50" y="92" width="20" height="12" rx="2" fill="#FFE0B2"/>
  <!-- Shirt -->
  <path d="M 30 104 Q 40 96 50 98 L 70 98 Q 80 96 90 104 L 90 120 L 30 120 Z" fill="#26A69A"/>
  <path d="M 50 98 L 60 105 L 70 98" fill="#00897B"/>
</svg>